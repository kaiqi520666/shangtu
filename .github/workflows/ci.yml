name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: ci-test-secret
      VIDEO_PROVIDER: topenrouter
      TOPENROUTER_KEY: ci-test-key
      TENCENT_CLOUD_SECRET_ID: ci-test-secret-id
      TENCENT_CLOUD_SECRET_KEY: ci-test-secret-key
      TENCENT_SES_FROM_EMAIL: no-reply@example.com
      TENCENT_SES_TEMPLATE_ID: 1
      TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check app tests
      - run: uv run pytest
      - run: uv run python -m compileall app

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build:check

  diff-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git diff --check
